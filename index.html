<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SureScore | AI Underwriting Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen relative">

    <nav class="p-6 border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-600 rounded-lg shadow-lg">
                    <i class="fas fa-shield-halved text-white text-lg"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter accent-text">SURESCORE</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="hidden md:flex gap-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                    <span>Accuracy: 98% [cite: 108]</span>
                    <span>Avg Time: < 5m </span>
                </div>
                <div class="px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[10px] font-bold uppercase">
                    <i class="fas fa-bolt animate-pulse mr-2"></i> Engine: Online
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 grid lg:grid-cols-5 gap-8 mt-12 pb-20">
        <div class="lg:col-span-2 space-y-6">
            <div class="glass-card p-8 rounded-3xl shadow-2xl">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-id-card text-indigo-400 text-sm"></i> New Application
                </h2>
                <div class="space-y-4">
                    <input id="name" type="text" placeholder="Full Legal Name" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="age" type="number" placeholder="Age" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                        <input id="income" type="number" placeholder="Income (₹)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                    </div>
                    <button onclick="runAssessment()" id="runBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 p-4 rounded-xl font-extrabold text-white uppercase tracking-widest text-xs transition-all">
                        Assess Risk Profile
                    </button>
                </div>
            </div>
        </div>

        <div id="results" class="lg:col-span-3">
            <div class="h-full min-h-[400px] glass-card rounded-3xl flex flex-col items-center justify-center text-slate-600 text-center p-12 border-dashed border-2 border-slate-800">
                <i class="fas fa-robot text-4xl mb-4 opacity-20"></i>
                <p class="italic text-sm">System ready for data ingestion[cite: 43].</p>
            </div>
        </div>
    </main>

    <button onclick="toggleChat()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center shadow-2xl z-[100] border border-indigo-400/30">
        <i class="fas fa-robot text-white text-xl"></i>
    </button>

    <div id="chatWindow" class="fixed bottom-24 right-6 w-80 h-[400px] glass-card rounded-3xl shadow-2xl hidden flex-col overflow-hidden z-[100] border border-white/10">
        <div class="p-4 bg-indigo-600 border-b border-white/5 flex justify-between items-center">
            <span class="text-[10px] font-bold uppercase tracking-widest text-white">NexusWeb Assistant</span>
            <button onclick="toggleChat()" class="text-white opacity-70 hover:opacity-100"><i class="fas fa-times"></i></button>
        </div>
        <div id="chatContent" class="flex-1 p-4 overflow-y-auto space-y-4 text-[11px] scrollbar-hide">
            <div class="bg-indigo-500/10 p-3 rounded-2xl border border-indigo-500/20 text-slate-300">
                Hello! I'm the SureScore LLM Agent[cite: 54]. How can I assist with this underwriting case?
            </div>
        </div>
        <div class="p-3 bg-slate-900 border-t border-white/5 flex gap-2">
            <input id="chatInput" type="text" placeholder="Ask about SHAP insights..." class="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-[10px] outline-none text-white" onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button onclick="sendChatMessage()" class="bg-indigo-600 px-4 rounded-lg"><i class="fas fa-paper-plane text-[10px] text-white"></i></button>
        </div>
    </div>

    <script>
        function toggleChat() {
            const chat = document.getElementById('chatWindow');
            chat.classList.toggle('hidden');
            chat.classList.toggle('flex');
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const content = document.getElementById('chatContent');
            if (!input.value.trim()) return;

            content.innerHTML += `<div class="bg-indigo-600 p-3 rounded-2xl max-w-[85%] ml-auto text-right text-white">${input.value}</div>`;
            const val = input.value.toLowerCase();
            input.value = "";
            content.scrollTop = content.scrollHeight;

            setTimeout(() => {
                let resp = "I'm analyzing that through our multi-agent architecture.";
                if (val.includes("risk")) resp = "Risk is calculated using XGBoost  and validated via SHAP[cite: 73, 93].";
                if (val.includes("time")) resp = "Our pipeline reduces time from 3-10 days to under 5 minutes.";
                
                content.innerHTML += `<div class="bg-slate-800 p-3 rounded-2xl border border-white/5 max-w-[85%] text-slate-300"><i class="fas fa-robot mr-1 text-indigo-400"></i> ${resp}</div>`;
                content.scrollTop = content.scrollHeight;
            }, 800);
        }

        async function runAssessment() {
            const btn = document.getElementById('runBtn');
            const resDiv = document.getElementById('results');
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin mr-2"></i> PROCESSING...';
            btn.disabled = true;

            try {
                const response = await fetch("https://surescore-api.onrender.com/assess-risk", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value || "Guest",
                        age: parseInt(document.getElementById('age').value) || 25,
                        income: parseFloat(document.getElementById('income').value) || 500000
                    })
                });

                if (!response.ok) throw new Error();
                const data = await response.json();
                
                resDiv.innerHTML = `
                    <div class="glass-card p-8 rounded-3xl border-t-4 border-indigo-500 animate-in fade-in duration-500">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest text-indigo-400">AI-Verified Decision [cite: 103]</h3>
                            <div class="text-sm text-emerald-400 font-black uppercase tracking-tighter">${data.status}</div>
                        </div>
                        <div class="text-8xl font-black tracking-tighter mb-8">${data.risk_score}<span class="text-2xl text-slate-700 font-bold italic">/100</span></div>
                        <div class="bg-slate-950/50 p-6 rounded-2xl border border-white/5">
                            <div class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-3">SHAP Explainability Insights [cite: 73, 93]</div>
                            <p class="text-slate-300 italic text-sm leading-relaxed border-l-2 border-indigo-500/30 pl-4">"${data.explanation}"</p>
                        </div>
                    </div>
                `;
            } catch (err) {
                resDiv.innerHTML = `<div class="glass-card p-12 rounded-3xl text-center text-rose-500 font-bold uppercase tracking-widest">Connection Error: Check API status.</div>`;
            } finally {
                btn.innerHTML = 'Assess Risk Profile';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

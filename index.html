<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SureScore AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.screen {
  display: none;
  padding: 40px;
}

.screen.active {
  display: block;
}

button {
  padding: 10px 20px;
  background: #7C3AED;
  border: none;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

#chatMessages {
  height: 250px;
  overflow-y: auto;
  border: 1px solid #444;
  margin: 10px;
  padding: 10px;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<div id="app">

<!-- LANDING -->
<section class="screen active" id="screen-landing">
  <h1>SureScore AI</h1>
  <p>AI Underwriting Co-Pilot</p>
  <button onclick="startAssessment()">Start Assessment</button>
</section>

<!-- CHAT -->
<section class="screen" id="screen-chat">
  <h2>Chat</h2>
  <div id="chatMessages"></div>
  <div id="chatInputArea">
    <input id="chatInput" placeholder="Type answer">
    <button onclick="nextQuestion()">Next</button>
  </div>
</section>

<!-- UPLOAD -->
<section class="screen" id="screen-upload">
  <h2>Upload</h2>
  <input type="file" onchange="goProcessing()">
</section>

<!-- PROCESSING -->
<section class="screen" id="screen-processing">
  <h2>Processing...</h2>
  <p id="procText">Starting...</p>
</section>

<!-- RESULTS -->
<section class="screen" id="screen-results">
  <h2>Results</h2>
  <h1 id="score">40 / 100</h1>
  <p>Low Risk</p>
</section>

</div>

<script>

// ================= PARTICLES =================
(function() {
  const canvas = document.getElementById('particleCanvas');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  let particles = Array.from({length:80}, () => ({
    x: Math.random()*W,
    y: Math.random()*H,
    vx: Math.random()-0.5,
    vy: Math.random()-0.5
  }));

  function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0,0,W,H);

    particles.forEach(p=>{
      p.x+=p.vx;
      p.y+=p.vy;

      ctx.fillStyle="#7C3AED";
      ctx.fillRect(p.x,p.y,2,2);
    });
  }

  window.addEventListener('resize', resize);
  resize();
  animate();
})();

// ================= NAVIGATION =================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

// ================= FLOW =================
function startAssessment() {
  showScreen('screen-chat');
  addMessage("What is your name?");
}

function addMessage(msg) {
  const box = document.getElementById('chatMessages');
  box.innerHTML += "<p>"+msg+"</p>";
}

let step = 0;

function nextQuestion() {
  const input = document.getElementById('chatInput').value;
  addMessage("You: " + input);

  step++;

  if(step === 1) addMessage("Enter your age");
  else if(step === 2) addMessage("Do you smoke?");
  else {
    showScreen('screen-upload');
  }
}

function goProcessing() {
  showScreen('screen-processing');

  let i=0;
  const texts = ["Analyzing...", "Calculating Risk...", "Generating Result..."];

  const interval = setInterval(()=>{
    document.getElementById('procText').innerText = texts[i];
    i++;
    if(i>=texts.length){
      clearInterval(interval);
      showScreen('screen-results');
    }
  },1000);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SureScore | AI Underwriting Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-transition { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-page { display: none; opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body class="min-h-screen relative">

    <section id="landingPage" class="page-transition min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="p-4 bg-indigo-600 rounded-2xl mb-6 shadow-2xl shadow-indigo-500/20">
            <i class="fas fa-shield-halved text-white text-4xl"></i>
        </div>
        <h1 class="text-6xl font-extrabold tracking-tighter mb-4">
            Welcome to <span class="accent-text">SURESCORE</span>
        </h1>
        <p class="text-slate-400 max-w-lg text-lg mb-10 leading-relaxed">
            Revolutionizing insurance with a multi-agent AI architecture. 
            Reduce underwriting time from 10 days to 5 minutes.
        </p>
        <button onclick="enterApp()" class="px-10 py-4 bg-white text-black font-black uppercase tracking-widest rounded-full hover:bg-indigo-400 hover:text-white transition-all shadow-xl active:scale-95">
            Get Started <i class="fas fa-arrow-right ml-2"></i>
        </button>
    </section>

    <section id="appDashboard" class="hidden-page page-transition">
        <nav class="p-6 border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="text-xl font-extrabold tracking-tighter accent-text">SURESCORE</span>
                </div>
                <div class="px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[10px] font-bold uppercase">
                    <i class="fas fa-bolt animate-pulse mr-2"></i> Engine: Online
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 grid lg:grid-cols-5 gap-8 mt-12 pb-20">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card p-8 rounded-3xl shadow-2xl">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">Assessment</h2>
                    <div class="space-y-4">
                        <input id="name" type="text" placeholder="Full Legal Name" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none text-white">
                        <div class="grid grid-cols-2 gap-4">
                            <input id="age" type="number" placeholder="Age" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none text-white">
                            <input id="income" type="number" placeholder="Income (₹)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none text-white">
                        </div>
                        <button onclick="runAssessment()" id="runBtn" class="w-full bg-indigo-600 p-4 rounded-xl font-extrabold text-white uppercase tracking-widest text-xs shadow-lg shadow-indigo-500/20">
                            Process Risk Profile
                        </button>
                    </div>
                </div>
            </div>
            <div id="results" class="lg:col-span-3">
                <div class="h-full min-h-[400px] glass-card rounded-3xl flex flex-col items-center justify-center text-slate-500 text-center p-12 border-dashed border-2 border-slate-800">
                    <i class="fas fa-robot text-4xl mb-4 opacity-20"></i>
                    <p class="italic text-sm">Ready for Agent Analysis.</p>
                </div>
            </div>
        </main>
    </section>

    <button id="chatButton" onclick="toggleChat()" class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-500 rounded-full flex items-center justify-center shadow-2xl z-[10000] border-2 border-indigo-300/30">
        <i class="fas fa-comment-dots text-white text-2xl"></i>
    </button>

    <div id="chatWindow" class="fixed bottom-24 right-6 w-80 h-[400px] glass-card rounded-3xl shadow-2xl hidden flex flex-col overflow-hidden z-[9999] border border-white/10">
        <div class="p-4 bg-indigo-600 flex justify-between items-center">
            <span class="text-[10px] font-bold uppercase tracking-widest">AI Assistant</span>
            <button onclick="toggleChat()"><i class="fas fa-times"></i></button>
        </div>
        <div id="chatContent" class="flex-1 p-4 overflow-y-auto space-y-4 text-[11px]">
            <div class="bg-indigo-500/20 p-3 rounded-2xl text-slate-200">Hi Yash! How can I help?</div>
        </div>
        <div class="p-3 bg-slate-900 border-t border-white/10 flex gap-2">
            <input id="chatInput" type="text" placeholder="Ask anything..." class="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-[10px] text-white outline-none" onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button onclick="sendChatMessage()" class="bg-indigo-600 px-4 rounded-lg"><i class="fas fa-paper-plane text-white text-[10px]"></i></button>
        </div>
    </div>

    <script>
        // Transition to App
        function enterApp() {
            document.getElementById('landingPage').classList.add('hidden-page');
            setTimeout(() => {
                document.getElementById('landingPage').style.display = 'none';
                document.getElementById('appDashboard').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('appDashboard').style.opacity = '1';
                    document.getElementById('appDashboard').style.transform = 'translateY(0)';
                }, 50);
            }, 600);
        }

        // Chatbot Logic
        function toggleChat() { document.getElementById('chatWindow').classList.toggle('hidden'); }
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const content = document.getElementById('chatContent');
            if (!input.value.trim()) return;
            content.innerHTML += `<div class="bg-indigo-600 p-2 rounded-xl ml-auto text-right text-white w-fit max-w-[80%]">${input.value}</div>`;
            input.value = "";
            content.scrollTop = content.scrollHeight;
            setTimeout(() => {
                content.innerHTML += `<div class="bg-slate-800 p-2 rounded-xl text-slate-300 w-fit max-w-[80%]">Processing your request via multi-agent logic...</div>`;
                content.scrollTop = content.scrollHeight;
            }, 800);
        }

        // API Assessment
        async function runAssessment() {
            const btn = document.getElementById('runBtn');
            const resDiv = document.getElementById('results');
            btn.innerHTML = 'ANALYZING...';
            btn.disabled = true;
            try {
                const response = await fetch("https://surescore-api.onrender.com/assess-risk", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value || "Guest",
                        age: parseInt(document.getElementById('age').value) || 25,
                        income: parseFloat(document.getElementById('income').value) || 500000
                    })
                });
                const data = await response.json();
                resDiv.innerHTML = `
                    <div class="glass-card p-8 rounded-3xl border-t-4 border-indigo-500 shadow-2xl">
                        <div class="text-[10px] text-indigo-400 font-bold uppercase mb-4">Risk Score</div>
                        <div class="text-7xl font-black mb-6">${data.risk_score}</div>
                        <div class="bg-slate-900 p-4 rounded-xl border border-white/5 text-sm italic text-slate-300">"${data.explanation}"</div>
                    </div>
                `;
            } catch (err) {
                resDiv.innerHTML = `<div class="text-rose-500 font-bold">API Offline. Wake up Render.</div>`;
            } finally {
                btn.innerHTML = 'Process Risk Profile';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SureScore | AI Underwriting Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .step-pill { transition: all 0.3s ease; opacity: 0.4; }
        .step-pill.active { opacity: 1; border-color: #6366f1; background: rgba(99, 102, 241, 0.1); }
        .stage-content { display: none; }
        .stage-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-600 rounded-lg shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-shield-halved text-white text-lg"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter accent-text">SURESCORE AI</span>
            </div>
            <div class="flex items-center gap-4">
                <div id="agent-status" class="px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-[10px] font-bold uppercase">
                    <i class="fas fa-robot animate-pulse mr-2"></i> Identity Agent: Active
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 mt-8 grid grid-cols-4 gap-4">
        <div id="pill-1" class="step-pill active p-3 rounded-xl border border-white/5 text-center text-[10px] font-bold uppercase">01. Identity</div>
        <div id="pill-2" class="step-pill p-3 rounded-xl border border-white/5 text-center text-[10px] font-bold uppercase">02. Health</div>
        <div id="pill-3" class="step-pill p-3 rounded-xl border border-white/5 text-center text-[10px] font-bold uppercase">03. Lifestyle</div>
        <div id="pill-4" class="step-pill p-3 rounded-xl border border-white/5 text-center text-[10px] font-bold uppercase">04. Documents</div>
    </div>

    <main class="max-w-7xl mx-auto px-6 grid lg:grid-cols-5 gap-8 mt-8 pb-20">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="glass-card p-8 rounded-3xl shadow-2xl relative">
                
                <div id="stage-1" class="stage-content active space-y-4">
                    <h2 class="text-2xl font-bold mb-6">New Application</h2>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Full Legal Name</label>
                    <input id="name" type="text" placeholder="e.g. Yash Patil" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none text-white focus:border-indigo-500">
                    <button onclick="nextStage(2)" class="w-full bg-indigo-600 p-4 rounded-xl font-black uppercase tracking-widest text-xs">Continue to Health</button>
                </div>

                <div id="stage-2" class="stage-content space-y-4">
                    <h2 class="text-2xl font-bold mb-6">Health Profile</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="age" type="number" placeholder="Age" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                        <input id="bmi" type="number" placeholder="BMI" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                    </div>
                    <select id="smoker" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                        <option value="0">Non-Smoker</option>
                        <option value="1">Smoker</option>
                    </select>
                    <button onclick="nextStage(3)" class="w-full bg-indigo-600 p-4 rounded-xl font-black uppercase tracking-widest text-xs">Continue to Lifestyle</button>
                </div>

                <div id="stage-3" class="stage-content space-y-4">
                    <h2 class="text-2xl font-bold mb-6">Lifestyle</h2>
                    <input id="income" type="number" placeholder="Annual Income (₹)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                    <select id="occupation" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                        <option value="desk">Desk Job</option>
                        <option value="field">Field Work</option>
                        <option value="hazardous">Hazardous</option>
                    </select>
                    <button onclick="nextStage(4)" class="w-full bg-indigo-600 p-4 rounded-xl font-black uppercase tracking-widest text-xs">Continue to Documents</button>
                </div>

                <div id="stage-4" class="stage-content space-y-4">
                    <h2 class="text-2xl font-bold mb-6">Ingestion</h2>
                    <label class="border-2 border-dashed border-slate-800 p-8 rounded-2xl text-center bg-slate-900/30 block cursor-pointer hover:border-indigo-500">
                        <input type="file" id="pdfUpload" class="hidden">
                        <i class="fas fa-file-pdf text-3xl text-slate-700 mb-2"></i>
                        <p class="text-[10px] text-slate-500 uppercase font-bold">Upload Medical/Vehicle Report</p>
                    </label>
                    <button onclick="runFinalAssessment()" id="runBtn" class="w-full bg-indigo-600 p-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-lg shadow-indigo-500/20">Run AI Pipeline</button>
                </div>
            </div>
        </div>

        <div id="results" class="lg:col-span-3">
            <div class="h-full min-h-[450px] glass-card rounded-3xl flex flex-col items-center justify-center text-slate-600 text-center p-12 border-dashed border-2 border-slate-800">
                <i class="fas fa-terminal opacity-20 text-4xl mb-4"></i>
                <p class="italic text-sm">System ready for Agentic Ingestion. <br> Complete the stages to trigger the Multi-Agent Pipeline.</p>
            </div>
        </div>
    </main>

    <script>
        function nextStage(num) {
            // Hide all stages
            document.querySelectorAll('.stage-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.step-pill').forEach(p => p.classList.remove('active'));
            
            // Show requested stage
            document.getElementById(`stage-${num}`).classList.add('active');
            document.getElementById(`pill-${num}`).classList.add('active');

            // Update Agent Telemetry
            const agentNames = ["", "Identity Agent", "Health Agent", "Lifestyle Agent", "OCR Agent"];
            document.getElementById('agent-status').innerHTML = `<i class="fas fa-robot animate-pulse mr-2"></i> ${agentNames[num]}: Active`;
        }

        async function runFinalAssessment() {
            const btn = document.getElementById('runBtn');
            const res = document.getElementById('results');
            btn.innerHTML = "PIPELINE RUNNING..."; btn.disabled = true;

            // Simulate the Multi-Agent Flow 
            res.innerHTML = `<div class="flex flex-col items-center"><i class="fas fa-circle-notch animate-spin text-indigo-500 text-4xl mb-4"></i><p class="accent-text font-bold uppercase tracking-widest text-xs">Executing Multi-Agent Orchestration...</p></div>`;
            
            setTimeout(async () => {
                const response = await fetch("https://surescore-api.onrender.com/assess-risk", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        age: document.getElementById('age').value,
                        income: document.getElementById('income').value
                    })
                });
                const data = await response.json();
                
                res.innerHTML = `
                    <div class="glass-card p-8 rounded-3xl border-t-4 border-indigo-500 shadow-2xl animate-in fade-in duration-500">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">Decision: AI-Verified [cite: 52]</h3>
                            <div class="text-xs text-emerald-400 font-bold uppercase">${data.status}</div>
                        </div>
                        <div class="text-8xl font-black tracking-tighter mb-8">${data.risk_score}<span class="text-2xl text-slate-700 font-bold italic">/100</span></div>
                        <div class="bg-slate-950/50 p-6 rounded-2xl border border-white/5">
                            <div class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-3">SHAP Insights [cite: 50]</div>
                            <p class="text-slate-300 italic text-sm leading-relaxed border-l-2 border-indigo-500/30 pl-4">"${data.explanation}"</p>
                        </div>
                        <button class="mt-8 bg-white text-black w-full p-4 rounded-xl font-bold uppercase text-xs">Approve Policy </button>
                    </div>
                `;
            }, 1500);
        }
    </script>
</body>
</html>

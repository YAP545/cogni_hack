<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SureScore AI | Underwriting Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* State Handling */
        #appDashboard { display: none; } /* Hidden by default */
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="landingPage" class="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-gradient-to-b from-slate-950 to-indigo-950">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-2xl mb-8">
            <i class="fas fa-shield-halved text-white text-4xl"></i>
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold mb-4 tracking-tighter">
            Next-Gen <span class="accent-text">SureScore</span>
        </h1>
        <p class="text-slate-400 max-w-xl text-lg mb-10">
            Automated Underwriting powered by Multi-Agent AI. <br>
            From days of manual work to seconds of precision.
        </p>
        <button onclick="goToDashboard()" class="bg-indigo-500 hover:bg-indigo-400 text-white px-12 py-5 rounded-full font-black uppercase tracking-[0.2em] text-sm shadow-2xl shadow-indigo-500/40 transition-all active:scale-95">
            Launch Platform <i class="fas fa-arrow-right ml-2"></i>
        </button>
    </div>

    <div id="appDashboard" class="fade-in">
        <nav class="p-6 border-b border-white/10 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center">
            <span class="text-xl font-black accent-text tracking-tighter">SURESCORE AI</span>
            <div class="px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[10px] font-bold rounded-full">
                LIVE ENGINE
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 py-12 grid lg:grid-cols-5 gap-8">
            <div class="lg:col-span-2">
                <div class="glass p-8 rounded-3xl">
                    <h3 class="text-xl font-bold mb-6">Risk Assessment</h3>
                    <div class="space-y-4">
                        <input id="name" type="text" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-indigo-500 text-white">
                        <div class="grid grid-cols-2 gap-4">
                            <input id="age" type="number" placeholder="Age" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none text-white">
                            <input id="income" type="number" placeholder="Income (₹)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none text-white">
                        </div>
                        <button onclick="runAI()" id="runBtn" class="w-full bg-indigo-600 p-4 rounded-xl font-bold uppercase tracking-widest text-xs">
                            Analyze Profile
                        </button>
                    </div>
                </div>
            </div>
            <div id="results" class="lg:col-span-3">
                <div class="h-full min-h-[400px] glass rounded-3xl flex flex-col items-center justify-center text-slate-500 italic text-center p-12">
                    <i class="fas fa-robot text-4xl mb-4 opacity-20"></i>
                    Awaiting Ingestion...
                </div>
            </div>
        </main>
    </div>

    <button onclick="toggleChat()" class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center shadow-2xl z-[1000]">
        <i class="fas fa-comment-dots text-white text-2xl"></i>
    </button>

    <div id="chatBox" class="fixed bottom-24 right-6 w-80 h-96 glass rounded-3xl shadow-2xl hidden flex-col overflow-hidden z-[999]">
        <div class="p-4 bg-indigo-600 flex justify-between items-center text-[10px] font-bold uppercase">
            <span>Nexus Assistant</span>
            <button onclick="toggleChat()"><i class="fas fa-times"></i></button>
        </div>
        <div id="chatLogs" class="flex-1 p-4 overflow-y-auto space-y-3 text-[11px]">
            <div class="bg-indigo-500/10 p-2 rounded-lg">Welcome! How can I assist with this underwriting case?</div>
        </div>
        <div class="p-3 bg-slate-900 flex gap-2">
            <input id="chatIn" type="text" class="flex-1 bg-black border border-slate-800 rounded p-2 text-[10px] text-white">
            <button onclick="sendMsg()" class="bg-indigo-600 px-3 rounded"><i class="fas fa-paper-plane text-white"></i></button>
        </div>
    </div>

    <script>
        // Transition Function
        function goToDashboard() {
            document.getElementById('landingPage').style.display = 'none';
            document.getElementById('appDashboard').style.display = 'block';
        }

        // Chatbot Function
        function toggleChat() { document.getElementById('chatBox').classList.toggle('hidden'); }
        function sendMsg() {
            const input = document.getElementById('chatIn');
            const logs = document.getElementById('chatLogs');
            if (!input.value) return;
            logs.innerHTML += `<div class="bg-indigo-600 p-2 rounded-lg ml-auto w-fit max-w-[80%]">${input.value}</div>`;
            input.value = "";
            logs.scrollTop = logs.scrollHeight;
        }

        // API Function
        async function runAI() {
            const btn = document.getElementById('runBtn');
            const res = document.getElementById('results');
            btn.innerHTML = "ANALYZING...";
            btn.disabled = true;
            try {
                const response = await fetch("https://surescore-api.onrender.com/assess-risk", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('name').value || "Yash",
                        age: parseInt(document.getElementById('age').value) || 21,
                        income: parseFloat(document.getElementById('income').value) || 1200000
                    })
                });
                const data = await response.json();
                res.innerHTML = `<div class="glass p-8 rounded-3xl fade-in border-t-4 border-indigo-500">
                    <div class="text-xs font-bold text-indigo-400 mb-2 uppercase tracking-widest">Risk Score</div>
                    <div class="text-8xl font-black mb-6">${data.risk_score}</div>
                    <p class="text-slate-300 italic text-sm bg-black/40 p-4 rounded-xl border border-white/5">"${data.explanation}"</p>
                </div>`;
            } catch (e) {
                res.innerHTML = `<div class="text-rose-500 font-bold">Error: Wake up the Render Engine.</div>`;
            } finally {
                btn.innerHTML = "Analyze Profile";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

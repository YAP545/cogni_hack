<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">
    <nav class="p-6 flex justify-between max-w-6xl mx-auto items-center">
        <div class="text-2xl font-black gradient-text tracking-tighter">SURESCORE</div>
        <div class="px-4 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[10px] font-bold tracking-widest uppercase">
            <i class="fas fa-circle animate-pulse mr-2"></i> Agents Online
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 grid lg:grid-cols-2 gap-12 mt-12">
        <div class="glass-panel p-8 rounded-3xl shadow-2xl">
            <h2 class="text-3xl font-bold mb-6">AI Underwriting <span class="text-indigo-400">Co-Pilot</span></h2>
            <div class="space-y-4">
                <input id="name" type="text" placeholder="Applicant Name" class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <div class="grid grid-cols-2 gap-4">
                    <input id="age" type="number" placeholder="Age" class="bg-slate-900/50 border border-slate-700 p-4 rounded-xl">
                    <input id="income" type="number" placeholder="Annual Income" class="bg-slate-900/50 border border-slate-700 p-4 rounded-xl">
                </div>
                <button onclick="runAI()" id="runBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 p-4 rounded-xl font-bold text-white transition-all transform hover:scale-[1.02]">
                    RUN MULTI-AGENT ASSESSMENT
                </button>
            </div>
        </div>

        <div id="results" class="space-y-4">
            <div class="h-full border-2 border-dashed border-slate-800 rounded-3xl flex items-center justify-center text-slate-600">
                Awaiting Data Ingestion...
            </div>
        </div>
    </div>

    <script>
        async function runAI() {
            const btn = document.getElementById('runBtn');
            const resDiv = document.getElementById('results');
            btn.innerText = "PROCESSING AGENTS...";
            
            try {
                // FIX 3: Use 127.0.0.1 explicitly to match the backend bind
                const response = await fetch('http://127.0.0.1:8000/assess-risk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value || "Yash Patil",
                        age: parseInt(document.getElementById('age').value) || 21,
                        income: parseFloat(document.getElementById('income').value) || 1200000
                    })
                });

                const data = await response.json();
                resDiv.innerHTML = `
                    <div class="glass-panel p-6 rounded-3xl border-l-4 border-indigo-500 animate-in fade-in slide-in-from-right-4">
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Risk Dashboard</div>
                        <div class="text-5xl font-black mb-2">${data.risk_score}<span class="text-sm font-normal text-slate-500">/100</span></div>
                        <div class="text-emerald-400 font-bold text-xs uppercase underline underline-offset-4">${data.status}</div>
                        <p class="mt-4 text-sm text-slate-400 italic">"${data.explanation}"</p>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl flex justify-between items-center">
                        <div>
                            <div class="text-[10px] text-slate-500 font-bold uppercase">Estimated Premium</div>
                            <div class="text-3xl font-black text-cyan-400">₹${data.suggested_premium}</div>
                        </div>
                        <button class="bg-white text-black px-6 py-3 rounded-xl font-bold hover:bg-indigo-100 transition">APPROVE</button>
                    </div>
                `;
            } catch (err) {
                alert("API Error: Ensure main.py is running!");
            } finally {
                btn.innerText = "RUN MULTI-AGENT ASSESSMENT";
            }
        }
    </script>
</body>
</html>

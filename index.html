<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SureScore AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Background -->
<canvas id="particleCanvas"></canvas>

<div id="app">

    <!-- LANDING -->
    <section class="screen active" id="screen-landing">
        <h1>SureScore AI</h1>
        <p>AI Underwriting Co-Pilot</p>
        <button onclick="startAssessment()">Start Assessment</button>
    </section>

    <!-- CHAT -->
    <section class="screen" id="screen-chat" style="display:none;">
        <h2>AI Chat</h2>
        <div id="chatMessages"></div>
        <div id="chatInputArea"></div>
    </section>

    <!-- UPLOAD -->
    <section class="screen" id="screen-upload" style="display:none;">
        <h2>Upload Documents</h2>
        <input type="file" multiple onchange="handleFileSelect(event)">
        <div id="fileList"></div>

        <div id="extractionPanel" style="display:none;">
            <div id="extBar"></div>
            <p id="extStatus"></p>
            <p id="extPct"></p>
        </div>

        <div id="extractedDataPanel" style="display:none;">
            <button onclick="navigateTo('screen-processing')">Continue</button>
        </div>
    </section>

    <!-- PROCESSING -->
    <section class="screen" id="screen-processing" style="display:none;">
        <h2>Processing...</h2>
        <div id="procLog"></div>
        <p>Factors: <span id="factorsVal">0</span></p>
        <p>Confidence: <span id="confVal">0%</span></p>
        <p>Time: <span id="timeVal">0s</span></p>
    </section>

    <!-- RESULTS -->
    <section class="screen" id="screen-results" style="display:none;">
        <h2>Results</h2>
        <canvas id="gaugeCanvas" width="300" height="300"></canvas>
        <h3 id="gaugeNum">0</h3>
        <div id="riskLevelText"></div>
        <h3 id="premiumVal">$0/mo</h3>
    </section>

</div>

<script src="app.js"></script>
</body>
</html>

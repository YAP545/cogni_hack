<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SureScore | AI Underwriting Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 bg-slate-950/50 sticky top-0 z-50 flex justify-between items-center">
        <span class="text-xl font-black accent-text">SURESCORE AI</span>
        <div class="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-[10px] font-bold rounded-full border border-emerald-500/20">ENGINE: ONLINE</div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12 grid lg:grid-cols-5 gap-8">
        <div class="lg:col-span-2 space-y-6">
            <div class="glass p-8 rounded-3xl shadow-2xl">
                <h3 class="text-xl font-bold mb-6 italic text-indigo-400">New Application</h3>
                <div class="space-y-4">
                    <input id="name" type="text" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="age" type="number" placeholder="Age" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                        <input id="income" type="number" placeholder="Income (₹)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                    </div>
                    
                    <label class="border-2 border-dashed border-slate-800 p-6 rounded-2xl text-center bg-slate-900/30 block cursor-pointer hover:border-indigo-500 transition-all">
                        <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
                        <i class="fas fa-file-pdf text-2xl text-slate-700 mb-2"></i>
                        <p class="text-[10px] text-slate-500 uppercase font-bold">Upload Report</p>
                        <p id="fileName" class="text-[9px] text-indigo-400 mt-1 italic">No file selected</p>
                    </label>

                    <button onclick="runAnalysis()" id="runBtn" class="w-full bg-indigo-600 p-4 rounded-xl font-black uppercase text-xs">Process Risk Profile</button>
                </div>
            </div>
        </div>

        <div id="results" class="lg:col-span-3">
            <div class="h-full min-h-[450px] glass rounded-3xl flex flex-col items-center justify-center text-slate-600 text-center p-12 border-dashed border-2 border-slate-800">
                <i class="fas fa-robot text-4xl mb-4 opacity-20"></i>
                <p id="statusText">Awaiting Data Ingestion...</p>
            </div>
        </div>
    </main>

    <button onclick="toggleChat()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 rounded-full flex shadow-2xl items-center justify-center z-[100]"><i class="fas fa-robot text-white text-xl"></i></button>
    <div id="chat" class="fixed bottom-24 right-6 w-80 h-96 glass rounded-3xl hidden flex-col overflow-hidden z-[100] border border-white/10">
        <div class="p-4 bg-indigo-600 text-[10px] font-bold">SURESCORE ASSISTANT</div>
        <div id="logs" class="flex-1 p-4 overflow-y-auto text-[11px] space-y-3"><div class="bg-indigo-500/10 p-2 rounded-lg text-slate-300">Hello Yash! Ask me anything about the risk logic.</div></div>
        <div class="p-3 bg-slate-900 flex gap-2"><input id="msg" type="text" class="flex-1 bg-black border border-slate-800 rounded p-2 text-white text-[10px]"><button onclick="sendMsg()" class="bg-indigo-600 px-3 rounded"><i class="fas fa-paper-plane text-white text-[10px]"></i></button></div>
    </div>

    <script>
        // Update filename on upload
        document.getElementById('pdfUpload').addEventListener('change', e => {
            const name = e.target.files[0] ? e.target.files[0].name : "No file selected";
            document.getElementById('fileName').innerText = "Selected: " + name;
        });

        function toggleChat() { document.getElementById('chat').classList.toggle('hidden'); document.getElementById('chat').classList.toggle('flex'); }
        function sendMsg() {
            const i = document.getElementById('msg'); const l = document.getElementById('logs');
            if(!i.value) return;
            l.innerHTML += `<div class="bg-indigo-600 p-2 rounded-lg ml-auto w-fit max-w-[80%]">${i.value}</div>`;
            i.value = "";
            setTimeout(() => { l.innerHTML += `<div class="bg-slate-800 p-2 rounded-lg w-fit max-w-[80%]">Analyzing SHAP metrics for you...</div>`; l.scrollTop = l.scrollHeight; }, 800);
        }

        async function runAnalysis() {
            const btn = document.getElementById('runBtn');
            const res = document.getElementById('results');
            btn.disabled = true;
            
            // Step-by-step Agent Progress
            const steps = ["OCR Agent: Extracting Data...", "Risk Agent: Running XGBoost...", "XAI Agent: Generating SHAP..."];
            for(let s of steps) {
                res.innerHTML = `<div class="flex flex-col items-center"><i class="fas fa-circle-notch animate-spin text-indigo-500 text-3xl mb-4"></i><p class="text-indigo-400 font-bold uppercase tracking-widest text-xs">${s}</p></div>`;
                await new Promise(r => setTimeout(r, 1200));
            }

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value || "Guest");
            formData.append('age', document.getElementById('age').value || 25);
            formData.append('income', document.getElementById('income').value || 500000);
            if(document.getElementById('pdfUpload').files[0]) formData.append('file', document.getElementById('pdfUpload').files[0]);

            try {
                const response = await fetch("https://surescore-api.onrender.com/assess-risk", { method: 'POST', body: formData });
                const data = await response.json();
                res.innerHTML = `
                    <div class="glass p-8 rounded-3xl border-t-4 border-indigo-500 w-full">
                        <div class="flex justify-between items-center mb-6"><span class="text-[10px] font-bold text-slate-500 uppercase">AI-Verified Score</span><div class="text-xs text-emerald-400 font-bold uppercase">${data.status}</div></div>
                        <div class="text-8xl font-black mb-8">${data.risk_score}<span class="text-2xl text-slate-700 italic">/100</span></div>
                        <div class="bg-black/40 p-5 rounded-2xl border border-white/5 text-sm italic text-slate-300">"${data.explanation}"</div>
                        <button onclick="alert('Policy #SS-2026 drafted!')" class="mt-6 w-full bg-white text-black p-4 rounded-xl font-bold uppercase text-xs">Approve Policy</button>
                    </div>`;
            } catch (e) { res.innerHTML = `<div class="text-rose-500 font-bold uppercase">Connection Error. Wake up Render.</div>`; }
            finally { btn.disabled = false; btn.innerHTML = "Process Risk Profile"; }
        }
    </script>
</body>
</html>

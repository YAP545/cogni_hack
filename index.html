<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SureScore | AI Underwriting Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden;}
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden-stage { display: none; }
    </style>
</head>
<body>

    <div id="landing" class="min-h-screen flex flex-col items-center justify-center text-center p-6 bg-slate-950">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-2xl mb-6">
            <i class="fas fa-shield-halved text-white text-4xl"></i>
        </div>
        <h1 class="text-6xl font-black mb-4 tracking-tighter">SURE<span class="accent-text">SCORE</span></h1>
        <p class="text-slate-400 max-w-md mb-8">Multi-Agent AI Underwriting Co-Pilot. <br> Efficiency: Days to Minutes.</p>
        <button onclick="enterApp()" class="bg-indigo-500 px-10 py-4 rounded-full font-bold uppercase tracking-widest text-sm hover:scale-105 transition-all">Launch Platform</button>
    </div>

    <div id="dashboard" class="hidden-stage min-h-screen">
        <nav class="p-6 border-b border-white/5 bg-slate-950/80 sticky top-0 flex justify-between items-center z-50">
            <span class="text-xl font-black accent-text">SURESCORE AI</span>
            <div class="text-[10px] font-bold text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">AGENT ENGINE: ONLINE</div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 py-12 grid lg:grid-cols-5 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-8 rounded-3xl">
                    <h3 class="text-xl font-bold mb-6 italic text-indigo-400">Application Ingestion</h3>
                    <div class="space-y-4">
                        <input id="name" type="text" placeholder="Applicant Name" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                        <div class="grid grid-cols-2 gap-4">
                            <input id="age" type="number" placeholder="Age" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                            <input id="income" type="number" placeholder="Income (₹)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                        </div>
                        <button onclick="runAnalysis()" id="runBtn" class="w-full bg-indigo-600 p-4 rounded-xl font-black uppercase tracking-widest text-xs hover:bg-indigo-500">Assess Risk Profile</button>
                    </div>
                </div>
            </div>
            <div id="output" class="lg:col-span-3">
                <div class="h-full min-h-[400px] glass rounded-3xl flex flex-col items-center justify-center text-slate-600 p-12 border-dashed border-2 border-slate-800 text-center">
                    <i class="fas fa-microchip text-4xl mb-4 opacity-20"></i>
                    <p>Awaiting Multi-Agent Pipeline execution...</p>
                </div>
            </div>
        </main>
    </div>

    <button onclick="toggleChat()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center shadow-2xl z-[100]"><i class="fas fa-robot text-white text-xl"></i></button>
    <div id="chat" class="fixed bottom-24 right-6 w-80 h-96 glass rounded-3xl hidden flex-col overflow-hidden z-[100] border border-white/10">
        <div class="p-4 bg-indigo-600 text-[10px] font-bold flex justify-between"><span>SURESCORE ASSISTANT</span><button onclick="toggleChat()"><i class="fas fa-times"></i></button></div>
        <div id="logs" class="flex-1 p-4 overflow-y-auto text-[11px] space-y-3"><div class="bg-indigo-500/10 p-2 rounded-lg text-slate-300">Hello Yash! I can explain the SHAP insights for this case.</div></div>
        <div class="p-3 bg-slate-900 flex gap-2 border-t border-white/5">
            <input id="msg" type="text" class="flex-1 bg-black border border-slate-800 rounded p-2 text-white text-[10px]" placeholder="Ask about risk logic...">
            <button onclick="send()" class="bg-indigo-600 px-3 rounded"><i class="fas fa-paper-plane text-white text-[10px]"></i></button>
        </div>
    </div>

    <script>
        function enterApp() { document.getElementById('landing').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; }
        function toggleChat() { document.getElementById('chat').classList.toggle('hidden'); document.getElementById('chat').classList.toggle('flex'); }
        function send() { 
            const i = document.getElementById('msg'); 
            const l = document.getElementById('logs'); 
            if(!i.value) return;
            l.innerHTML += `<div class="bg-indigo-600 p-2 rounded-lg ml-auto w-fit max-w-[80%]">${i.value}</div>`;
            const v = i.value.toLowerCase(); i.value = "";
            setTimeout(() => {
                let r = "Analyzing metrics via the Multi-Agent Pipeline...";
                if(v.includes("risk")) r = "Risk is scored using XGBoost. Current logic weights income-to-age stability heavily.";
                l.innerHTML += `<div class="bg-slate-800 p-2 rounded-lg w-fit max-w-[80%]"><i class="fas fa-robot mr-1 text-indigo-400"></i> ${r}</div>`;
                l.scrollTop = l.scrollHeight;
            }, 800);
        }

        async function runAnalysis() {
            const btn = document.getElementById('runBtn');
            const out = document.getElementById('output');
            btn.innerHTML = "PROCESSING AGENTS..."; btn.disabled = true;
            try {
                const res = await fetch("https://surescore-api.onrender.com/assess-risk", {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: document.getElementById('name').value || "Yash", age: parseInt(document.getElementById('age').value) || 21, income: parseFloat(document.getElementById('income').value) || 1200000})
                });
                const data = await res.json();
                out.innerHTML = `
                    <div class="glass p-8 rounded-3xl border-t-4 border-indigo-500 animate-pulse-once">
                        <div class="flex justify-between items-center mb-6"><span class="text-[10px] font-bold text-indigo-400 uppercase">Output Dashboard</span><div class="text-xs text-emerald-400 font-bold uppercase">${data.status}</div></div>
                        <div class="text-8xl font-black mb-8">${data.risk_score}<span class="text-2xl text-slate-700 italic">/100</span></div>
                        <div class="bg-black/40 p-5 rounded-2xl border border-white/5 text-sm italic text-slate-300">"${data.explanation}"</div>
                        <div class="mt-8 flex gap-4"><div class="flex-1 p-4 bg-slate-900 rounded-xl border border-white/5 text-xl font-bold text-cyan-400">₹${data.suggested_premium}</div><button class="bg-white text-black px-6 rounded-xl font-bold uppercase text-[10px]">Approve</button></div>
                    </div>
                `;
            } catch (e) { out.innerHTML = `<div class="text-rose-500 font-bold uppercase">API Connection Timeout. Please wake up Render Engine.</div>`; }
            finally { btn.innerHTML = "Assess Risk Profile"; btn.disabled = false; }
        }
    </script>
</body>
</html>

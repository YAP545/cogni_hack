<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SureScore | AI Underwriting Co-Pilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { box-shadow: 0 0 20px rgba(79, 70, 229, 0.4); }
    </style>
</head>
<body class="overflow-x-hidden">
    <nav class="flex justify-between items-center p-6 max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <i class="fas fa-shield-alt text-indigo-500 text-2xl"></i>
            <span class="text-xl font-bold tracking-tighter italic">SureScore</span>
        </div>
        <div class="text-xs font-bold text-emerald-500 border border-emerald-500/30 px-3 py-1 rounded-full bg-emerald-500/10">
            <i class="fas fa-circle animate-pulse mr-2"></i>AI ENGINE ACTIVE
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-12 grid lg:grid-cols-2 gap-12">
        <div class="space-y-8">
            <h1 class="text-5xl font-extrabold leading-tight">
                AI Underwriting <span class="text-indigo-400">Co-Pilot</span>
            </h1>
            <p class="text-slate-400">Automate insurance evaluation with multi-agent intelligence[cite: 35].</p>
            
            <div class="glass p-8 rounded-2xl space-y-4">
                <input id="name" type="text" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl focus:border-indigo-500 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input id="age" type="number" placeholder="Age" class="bg-slate-900 border border-slate-800 p-4 rounded-xl">
                    <input id="income" type="number" placeholder="Annual Income" class="bg-slate-900 border border-slate-800 p-4 rounded-xl">
                </div>
                <button onclick="startAssessment()" id="assessBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 p-4 rounded-xl font-bold glow transition-all">
                    START SMART ASSESSMENT
                </button>
            </div>
        </div>

        <div id="resultsArea" class="space-y-6">
            <div class="h-64 border-2 border-dashed border-slate-800 rounded-2xl flex items-center justify-center text-slate-500 italic">
                Awaiting Data Ingestion...
            </div>
        </div>
    </main>

    <script>
        async function startAssessment() {
            const btn = document.getElementById('assessBtn');
            const results = document.getElementById('resultsArea');
            
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:8000/assess-risk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value || "Guest",
                        age: parseInt(document.getElementById('age').value) || 25,
                        income: parseFloat(document.getElementById('income').value) || 500000
                    })
                });

                const data = await response.json();
                
                results.innerHTML = `
                    <div class="glass p-6 rounded-2xl animate-fade-in">
                        <div class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Risk Score</div>
                        <div class="text-5xl font-bold text-white mb-2">${data.risk_score}<span class="text-xl text-slate-600">/100</span></div>
                        <div class="inline-block px-3 py-1 bg-emerald-500/20 text-emerald-400 text-xs font-bold rounded">${data.status}</div>
                    </div>
                    <div class="glass p-6 rounded-2xl border-l-4 border-indigo-500">
                        <div class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-2">SHAP Explainability [cite: 74]</div>
                        <p class="text-slate-300 italic">"${data.explanation}"</p>
                    </div>
                    <div class="glass p-6 rounded-2xl flex justify-between items-center">
                        <div>
                            <div class="text-xs text-slate-500 uppercase font-bold">Recommended Premium</div>
                            <div class="text-3xl font-bold text-cyan-400">₹${data.suggested_premium}/mo</div>
                        </div>
                        <button class="bg-white text-black px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition">APPROVE</button>
                    </div>
                `;
            } catch (err) {
                alert("Connection Error: Is FastAPI running on port 8000?");
            } finally {
                btn.innerText = "START SMART ASSESSMENT";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

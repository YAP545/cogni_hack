<button onclick="toggleChat()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center shadow-2xl shadow-indigo-500/40 hover:scale-110 transition-all z-[100]">
    <i class="fas fa-comment-dots text-white text-xl"></i>
</button>

<div id="chatWindow" class="fixed bottom-24 right-6 w-80 h-96 glass-card rounded-3xl shadow-2xl hidden flex-col overflow-hidden z-[100] border border-white/10">
    <div class="p-4 bg-indigo-600/20 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
            <span class="text-[10px] font-bold uppercase tracking-widest">Underwriting Assistant</span>
        </div>
        <button onclick="toggleChat()" class="text-slate-400 hover:text-white"><i class="fas fa-times"></i></button>
    </div>
    
    <div id="chatContent" class="flex-1 p-4 overflow-y-auto space-y-4 text-[11px]">
        <div class="bg-indigo-500/10 p-3 rounded-2xl border border-indigo-500/20 max-w-[80%]">
            Hello Underwriter! How can I help you with **SureScore** assessments today?
        </div>
    </div>

    <div class="p-3 bg-slate-900/50 border-t border-white/5 flex gap-2">
        <input id="chatInput" type="text" placeholder="Ask about policy rules..." class="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-[10px] outline-none focus:border-indigo-500">
        <button onclick="sendChatMessage()" class="bg-indigo-600 px-3 rounded-lg"><i class="fas fa-paper-plane text-[10px]"></i></button>
    </div>
</div>

<script>
    function toggleChat() {
        const chat = document.getElementById('chatWindow');
        chat.classList.toggle('hidden');
        chat.classList.toggle('flex');
    }

    async function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const content = document.getElementById('chatContent');
        if (!input.value) return;

        // Add User Message
        content.innerHTML += `<div class="bg-slate-800 p-3 rounded-2xl max-w-[80%] ml-auto text-right">${input.value}</div>`;
        
        const userMsg = input.value.toLowerCase();
        input.value = "";
        content.scrollTop = content.scrollHeight;

        // Simulated AI Response based on your Business Plan
        setTimeout(() => {
            let response = "I'm analyzing that requirement against our current compliance rules[cite: 55].";
            if (userMsg.includes("risk")) response = "Risk is calculated using XGBoost and validated via SHAP explainability[cite: 71, 73].";
            if (userMsg.includes("time")) response = "Our multi-agent pipeline reduces processing from days to under 5 minutes.";
            
            content.innerHTML += `<div class="bg-indigo-500/10 p-3 rounded-2xl border border-indigo-500/20 max-w-[80%]">
                <i class="fas fa-robot mr-1 text-indigo-400"></i> ${response}
            </div>`;
            content.scrollTop = content.scrollHeight;
        }, 800);
    }
</script>
